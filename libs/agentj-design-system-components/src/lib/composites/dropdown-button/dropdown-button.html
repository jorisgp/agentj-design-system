<div class="agentjds-dropdown-button">
  <button
    type="button"
    [disabled]="disabled()"
    [class]="'agentjds-dropdown-button__trigger agentjds-dropdown-button__trigger--' + variant() + ' agentjds-dropdown-button__trigger--' + size()"
    (click)="toggle()"
  >
    <span class="agentjds-dropdown-button__label">{{ label() }}</span>
    <agentjds-icon
      name="chevron-down"
      size="sm"
      color="inherit"
      [class]="'agentjds-dropdown-button__chevron' + (isOpen() ? ' agentjds-dropdown-button__chevron--open' : '')"
    />
  </button>

  @if (isOpen() && options().length) {
  <ul class="agentjds-dropdown-button__menu" role="listbox">
    @for (option of options(); track option.value) {
    <li
      class="agentjds-dropdown-button__option"
      [class.agentjds-dropdown-button__option--disabled]="option.disabled"
      role="option"
      (click)="!option.disabled && select(option.value)"
      (keydown.enter)="!option.disabled && select(option.value)"
      tabindex="0"
    >
      {{ option.label }}
    </li>
    }
  </ul>
  }
</div>
