<div class="agentjds-input-checkbox-wrapper">
  <label
    class="agentjds-input-checkbox"
    [class.agentjds-input-checkbox--disabled]="isDisabled()"
  >
    <input
      type="checkbox"
      class="agentjds-input-checkbox__control"
      [checked]="checked"
      [disabled]="isDisabled()"
      [required]="required()"
      (change)="onCheckboxChange($event)"
      (blur)="onBlur()"
    />
    <span class="agentjds-input-checkbox__label">
      {{ label() }} @if (required()) {
      <span class="agentjds-input-checkbox__required">*</span>
      }
    </span>
  </label>

  @if (error()) {
  <p class="agentjds-input-checkbox__error">{{ error() }}</p>
  } @if (hint() && !error()) {
  <p class="agentjds-input-checkbox__hint">{{ hint() }}</p>
  }
</div>
