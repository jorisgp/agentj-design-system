<div class="agentjds-input-radio-wrapper">
  @if (label()) {
  <p class="agentjds-input-radio__label">
    {{ label() }} @if (required()) {
    <span class="agentjds-input-radio__required">*</span>
    }
  </p>
  }

  <div class="agentjds-input-radio__options">
    @for (option of options(); track option.value) {
    <label
      class="agentjds-input-radio__option"
      [class.agentjds-input-radio__option--disabled]="isOptionDisabled(option)"
    >
      <input
        type="radio"
        class="agentjds-input-radio__input"
        [name]="groupName()"
        [value]="option.value"
        [checked]="value === option.value"
        [disabled]="isOptionDisabled(option)"
        (change)="onSelectionChange($event)"
        (blur)="onBlur()"
      />
      <span class="agentjds-input-radio__text">{{ option.label }}</span>
    </label>
    }
  </div>

  @if (error()) {
  <p class="agentjds-input-radio__error">{{ error() }}</p>
  } @if (hint() && !error()) {
  <p class="agentjds-input-radio__hint">{{ hint() }}</p>
  }
</div>
