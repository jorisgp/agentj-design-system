<article [class]="'jaids-chat-bubble jaids-chat-bubble--' + direction()">
  @if (author() || timestamp()) {
  <header class="jaids-chat-bubble__meta">
    @if (author()) {
    <span class="jaids-chat-bubble__author">{{ author() }}</span>
    } @if (timestamp()) {
    <time class="jaids-chat-bubble__time">{{ timestamp() }}</time>
    }
  </header>
  }

  <p [class]="'jaids-chat-bubble__message jaids-chat-bubble__message--' + tone()">
    {{ message() }}
  </p>
</article>
